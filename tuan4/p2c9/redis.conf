# Cho phép kết nối từ mọi nơi (trong môi trường Docker)
bind 0.0.0.0

# Đặt mật khẩu truy cập (Bảo mật cơ bản)
requirepass my_super_secret_redis

# Giới hạn dung lượng RAM tối đa Redis được phép dùng là 256MB
maxmemory 256mb

# Thuật toán xóa dữ liệu cũ khi đầy RAM (LRU: Least Recently Used - Xóa cái ít dùng nhất)
maxmemory-policy allkeys-lru