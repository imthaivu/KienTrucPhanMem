version: '3.8'

services:
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8081:8081"
    networks:
      - food-ordering-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/users"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  food-service:
    build:
      context: ./food-service
      dockerfile: Dockerfile
    container_name: food-service
    ports:
      - "8082:8082"
    networks:
      - food-ordering-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8082/foods"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "8083:8083"
    environment:
      - USER_SERVICE_URL=http://user-service:8081
      - FOOD_SERVICE_URL=http://food-service:8082
    networks:
      - food-ordering-network
    depends_on:
      user-service:
        condition: service_healthy
      food-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8083/orders"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "8084:8084"
    environment:
      - ORDER_SERVICE_URL=http://order-service:8083
    networks:
      - food-ordering-network
    depends_on:
      order-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8084/payments/1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - USER_SERVICE_URL=http://user-service:8081
      - FOOD_SERVICE_URL=http://food-service:8082
      - ORDER_SERVICE_URL=http://order-service:8083
      - PAYMENT_SERVICE_URL=http://payment-service:8084
    networks:
      - food-ordering-network
    depends_on:
      - user-service
      - food-service
      - order-service
      - payment-service

networks:
  food-ordering-network:
    driver: bridge
